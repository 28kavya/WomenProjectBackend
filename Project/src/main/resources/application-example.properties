spring.application.name=WomenProject
spring.datasource.url=jdbc:mysql://localhost:3306/WomenProject
spring.datasource.username=${DB_UNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
server.address=0.0.0.0
server.port=8080
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
# ============= DATABASE CONFIG =============
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ============= AUDIO CONFIG =============
app.audio.upload-dir=uploads/
app.audio.chunk-duration=20000
app.audio.max-file-size=5242880
#==============TWILIO===============
twilio.account.sid=${TWILIO_ACC_SID}
twilio.auth.token=${TWILIO_TOKEN}
twilio.phone.number=${TWILIO_NUM}
